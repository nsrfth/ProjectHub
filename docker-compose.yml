services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      COOKIE_SECURE: ${COOKIE_SECURE}
      CORS_ORIGINS: ${CORS_ORIGINS}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES}
      UPLOAD_DIR: ${UPLOAD_DIR}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX}
      AUTH_RATE_LIMIT_WINDOW: ${AUTH_RATE_LIMIT_WINDOW}
      MASTER_KEY: ${MASTER_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      UPDATE_CHECK_ENABLED: ${UPDATE_CHECK_ENABLED}
      UPDATE_CHECK_CACHE_HOURS: ${UPDATE_CHECK_CACHE_HOURS}
      # Identifies the running build to the About page + update check.
      # Set in .env (e.g. TASKHUB_VERSION=v1.44.0) so the deploy reports
      # the right tag. Empty string is fine — the backend falls back to "dev".
      TASKHUB_VERSION: ${TASKHUB_VERSION:-}
      TASKHUB_BUILD_TIME: ${TASKHUB_BUILD_TIME:-}
      SYSTEM_USER_EMAIL: ${SYSTEM_USER_EMAIL:-admin@taskhub.local}
      # v1.22: self-upgrade plumbing. Backend POSTs to UPDATER_URL on a
      # successful admin upgrade-now request. Leave both blank to disable
      # the in-app upgrade button (the API endpoint then returns 503).
      UPDATER_URL: ${UPDATER_URL:-}
      UPDATER_TOKEN: ${UPDATER_TOKEN:-}
      # v1.27: automatic database backups. Off by default — set
      # BACKUP_ENABLED=true in .env to let the scheduler tick. Interval /
      # retention are admin-configurable in Settings → Backups (persisted
      # to InstanceSetting). BACKUP_DIR lives on the named volume so dumps
      # survive container rebuilds.
      # v2.6–v2.8 (Access & Organization Redesign): all default-off/inert.
      # See .env.example for the flag-walk discipline on each.
      DIRECTORY_SYNC_ENABLED: ${DIRECTORY_SYNC_ENABLED:-false}
      DIRECTORY_SYNC_INTERVAL_MIN: ${DIRECTORY_SYNC_INTERVAL_MIN:-1440}
      DIRECTORY_SYNC_PAGE_SIZE: ${DIRECTORY_SYNC_PAGE_SIZE:-500}
      DIRECTORY_SYNC_MAX_USERS: ${DIRECTORY_SYNC_MAX_USERS:-10000}
      DIRECTORY_SYNC_DRY_RUN: ${DIRECTORY_SYNC_DRY_RUN:-false}
      DIRECTORY_SYNC_REVOKE_GLOBAL_ROLE: ${DIRECTORY_SYNC_REVOKE_GLOBAL_ROLE:-false}
      DIRECTORY_SYNC_TIMEOUT_SEC: ${DIRECTORY_SYNC_TIMEOUT_SEC:-300}
      ACCESS_UNIT_SCOPE: ${ACCESS_UNIT_SCOPE:-false}
      ACCESS_UNIFIED_GRANTS: ${ACCESS_UNIFIED_GRANTS:-off}
      ACCESS_GRANT_CONSENT: ${ACCESS_GRANT_CONSENT:-false}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-false}
      BACKUP_DIR: ${BACKUP_DIR:-/app/backups}
      BACKUP_CHECK_INTERVAL_MIN: ${BACKUP_CHECK_INTERVAL_MIN:-15}
      # v2.5.36: lets Settings → Backups show online-backup (Kopia) status. The
      # kopia service is reachable at kopia:51515 on the compose network when
      # the `backup` profile is up; harmless (status just shows "not set up")
      # when it isn't.
      KOPIA_SERVER_URL: ${KOPIA_SERVER_URL:-http://kopia:51515}
      KOPIA_SERVER_USERNAME: ${KOPIA_SERVER_USERNAME:-}
      KOPIA_SERVER_PASSWORD: ${KOPIA_SERVER_PASSWORD:-}
      CERT_DIR: ${CERT_DIR:-/app/certs}
    volumes:
      - uploads_data:/app/uploads
      - backups_data:/app/backups
      - caddy_custom_certs:/app/certs
      # v2.5.37: where the app writes the Kopia service-account key, repo
      # password, policy triggers, and reads back status.json.
      - kopia_secrets:/app/kopia-secrets
    expose:
      - "4000"

  frontend-build:
    build:
      # v1.10.1: context is the repo root so the build can see
      # USER_MANUAL.md (consumed by frontend/scripts/copy-manual.mjs as a
      # prebuild step). Dockerfile paths reference frontend/ explicitly.
      context: .
      dockerfile: ./docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        # Pass a new value when you need a fresh SPA bundle (e.g. CACHEBUST=2).
        CACHEBUST: ${CACHEBUST:-1}
    # One-shot build; output is copied to the shared volume below.
    command: ["sh", "-c", "cp -r /app/dist/. /export/ && echo build complete"]
    volumes:
      - frontend_dist:/export

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend-build
    environment:
      SITE_HOST: ${SITE_HOST}
      ACME_EMAIL: ${ACME_EMAIL}
      # Textually substituted into the Caddyfile. Empty for local HTTP (:80);
      # on prod set to: tls /etc/caddy/custom/fullchain.pem /etc/caddy/custom/private.key
      TLS_DIRECTIVE: ${TLS_DIRECTIVE:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_custom_certs:/etc/caddy/custom:ro

  # v1.23: throwaway Postgres for the integration test suite. Gated by the
  # `test` profile so a stock `docker compose up` doesn't start it. Bring up
  # explicitly with:
  #   docker compose --profile test up -d postgres-test
  # Then run the suite with the test DATABASE_URL — see backend/package.json
  # `test:integration` and tests/setup.ts (which refuses to run if the URL
  # doesn't look like a test DB). Volume is anonymous so a fresh start
  # always wipes prior fixtures.
  postgres-test:
    image: postgres:16-alpine
    profiles: ['test']
    environment:
      POSTGRES_USER: taskhub
      POSTGRES_PASSWORD: taskhub
      POSTGRES_DB: taskhub_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskhub -d taskhub_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  # v1.22: self-upgrade sidecar. PRIVILEGED — mounts the host docker socket +
  # the repo directory so it can run `git pull && docker compose up -d --build`.
  # Gated by the `upgrade` profile so a stock `docker compose up` doesn't
  # start it. Bring it up explicitly with:
  #   docker compose --profile upgrade up -d updater
  # Set UPDATER_TOKEN in .env to a long random string; the backend will only
  # talk to the updater when both ends share the same token.
  updater:
    build:
      context: ./updater
      dockerfile: ../docker/updater.Dockerfile
    profiles: ['upgrade']
    restart: unless-stopped
    environment:
      UPDATER_TOKEN: ${UPDATER_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/repo
    # No port mapping — the updater is reachable only from inside the compose
    # network at updater:9000. Never expose this to the host or the world.

  # Local OpenLDAP for development + the LDAP integration test. Gated by the
  # `ldap` profile so a plain `docker compose up` doesn't start it.
  # Bring it up explicitly with: docker compose --profile ldap up -d openldap
  openldap:
    image: osixia/openldap:1.5.0
    profiles: ['ldap']
    environment:
      LDAP_ORGANISATION: TaskHub
      # Auto-derives baseDN = dc=taskhub,dc=local.
      LDAP_DOMAIN: taskhub.local
      LDAP_ADMIN_PASSWORD: adminpass
    # No LDIF mount — the integration test seeds entries via ldapts at
    # suite start, which works for both this dev container and the
    # ephemeral CI service container. The .ldif file under docker/openldap/
    # is kept as human-readable documentation of the expected fixture.
    ports:
      - "1389:389"

  # Kopia — encrypted, deduplicating, versioned backups with a web UI
  # (UpdraftPlus-style: browse snapshots, one-click restore, multi-cloud).
  # Gated by the `backup` profile so a plain `docker compose up` never starts it:
  #   docker compose --profile backup up -d kopia
  #
  # v2.5.37: SELF-CONFIGURING. Everything the admin enters in ProjectHub's
  # Settings → Backups (service-account key, repository password, Google Drive
  # folder, schedule, retention) is written by the backend to the shared
  # `kopia_secrets` volume + backups_data/online-backup.json. The custom
  # entrypoint reads it, connects/creates the encrypted Google Drive repository,
  # applies the policy, starts the server (UI + scheduled snapshots), and
  # reconciles on file triggers the backend drops (Initialize / Back up now).
  # No SSH / .env editing needed. Kopia encrypts client-side before upload, so
  # Google only sees ciphertext (the dumps contain secrets).
  kopia:
    image: kopia/kopia:latest
    profiles: ['backup']
    restart: unless-stopped
    hostname: projecthub-kopia
    # Root so it can read/write the app-owned kopia_secrets volume regardless of
    # the backend's uid (avoids the classic shared-volume uid mismatch).
    user: "0:0"
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]
    environment:
      KOPIA_CONFIG_PATH: /app/config/repository.config
      KOPIA_CACHE_DIRECTORY: /app/cache
      KOPIA_LOG_DIR: /app/logs
      # Web-UI (http://<host>:51515) login. Repo password is NOT here — it comes
      # from the shared volume where ProjectHub writes what the admin set.
      KOPIA_SERVER_USERNAME: ${KOPIA_SERVER_USERNAME:-admin}
      KOPIA_SERVER_PASSWORD: ${KOPIA_SERVER_PASSWORD:-admin}
    volumes:
      - backups_data:/app/backups:ro                 # snapshot source (app dumps)
      - kopia_secrets:/app/secrets                    # SA key + repo password + status + triggers (from the app)
      - ./docker/kopia-entrypoint.sh:/app/entrypoint.sh:ro
      - kopia_config:/app/config
      - kopia_cache:/app/cache
      - kopia_logs:/app/logs
    ports:
      - "51515:51515"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  backups_data:
  frontend_dist:
  caddy_data:
  caddy_config:
  caddy_custom_certs:
  kopia_config:
  kopia_cache:
  kopia_logs:
  # v2.5.37: SA key + repo password + status/triggers shared backend ↔ kopia.
  kopia_secrets:
