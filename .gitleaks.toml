# ProjectHub secret-scanning configuration (W1.2, v2.5.23).
#
# Extends gitleaks' default ruleset and adds an EXPLICITLY ENUMERATED allowlist
# for the handful of known-benign matches the default rules flag: documentation
# API examples and non-production test/seed fixtures. Deliberately NO blanket
# path excludes — each allowance is a narrow regex scoped to the specific
# fixture value or the documentation placeholder domain, so a real secret in the
# same file would still be caught.
#
# Baseline (v2.5.22 history) findings this covers:
#   - curl-auth-header  × the `taskhub.example.com/api/auth/me` doc example
#                         (USER_MANUAL.md / .fa.md + their frontend/public copies)
#   - generic-api-key   × the test-only MASTER_KEY in .github/workflows/test.yml

title = "ProjectHub gitleaks configuration"

[extend]
useDefault = true

[allowlist]
description = "Known-benign documentation examples and non-production test/seed fixtures (W1.2). No blanket path excludes — each entry is scoped to a specific fixture value or the doc placeholder domain."
# Match each regex against the whole finding line, so we can scope by the
# surrounding context (e.g. the documentation domain) rather than the secret.
regexTarget = "line"
regexes = [
  # Documentation: `curl https://taskhub.example.com/api/auth/me -H "Authorization: Bearer <placeholder>"`.
  # taskhub.example.com is the manual's placeholder host; any bearer token shown
  # against it is an illustrative example, never a live credential.
  '''taskhub\.example\.com/api/auth/me''',

  # Test-only MASTER_KEY fixture (32-byte hex) used by the CI test job and the
  # integration suite (tests/**, .github/workflows/test.yml). Not a prod key.
  '''00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff''',

  # Test-only JWT signing secrets (tests/** + workflows). Length-padded strings
  # whose literal text advertises that they are test fixtures.
  '''test_access_secret_at_least_32_chars_long''',
  '''test_refresh_secret_at_least_32_chars_long''',

  # Non-production seed / demo passwords documented in INSTALL.md and produced by
  # prisma/seed*.ts (the install flow tells operators to rotate them immediately).
  '''Demo2026!''',
  '''demo1234''',

  # Integration-test login password fixture (tests/**).
  '''CorrectHorseBattery9''',
]
